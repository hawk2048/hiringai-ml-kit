name: CI / CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ── Lint & Unit Test ──────────────────────────────────────
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew :ml:lint

      - name: Run Unit Tests
        run: ./gradlew :ml:testDebugUnitTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ml/build/reports/tests/

  # ── Build Library AAR ─────────────────────────────────────
  build-aar:
    name: Build AAR
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [ debug, release ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build AAR (${{ matrix.build-type }})
        run: ./gradlew :ml:assemble${{ matrix.build-type }}

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: hiringai-ml-kit-${{ matrix.build-type }}
          path: ml/build/outputs/aar/

  # ── Build Standalone APK (if app module exists) ──────────
  build-apk:
    name: Build Standalone APK
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [ debug, release ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK (${{ matrix.build-type }})
        run: |
          if grep -q "include ':app'" settings.gradle; then
            ./gradlew :app:assemble${{ matrix.build-type }}
          else
            echo "::notice::app module not found, skipping APK build"
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: standalone-apk-${{ matrix.build-type }}
          path: app/build/outputs/apk/

  # ── Auto Release on Tag ──────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-aar, build-apk ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List Artifacts
        run: find artifacts/ -type f | head -50

      - name: Extract Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract section for current version
            NOTES=$(sed -n "/## \[${{ steps.version.outputs.VERSION }}\]/,/## \[/p" CHANGELOG.md | head -n -1)
            if [ -z "$NOTES" ]; then
              NOTES="Release v${{ steps.version.outputs.VERSION }}"
            fi
          else
            NOTES="Release v${{ steps.version.outputs.VERSION }}"
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HiringAI ML Kit v${{ steps.version.outputs.VERSION }}"
          body: "${{ steps.notes.outputs.NOTES }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            artifacts/hiringai-ml-kit-release/*.aar
            artifacts/standalone-apk-release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
